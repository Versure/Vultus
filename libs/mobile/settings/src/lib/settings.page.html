<!--
  Settings page — visual alignment to the Stitch "Settings - Vultus" screen
  (projects/13590348714018893783/screens/81945ff3381e453dafcc4e5ce896fcfa).

  The screen groups settings into rounded surface-container cards, each with a
  left icon tile, a primary title (body-lg) + helper subtitle (body-md), and a
  trailing control/value. Only the TWO real spec-0011 controls carry behaviour:
  the Region picker and the global Notifications toggle. The screen's other rows
  (profile block, "Notification Preferences" nav, Appearance/Dark Mode, About,
  Sign Out) are decorative/deferred features and are intentionally NOT rendered
  or wired (spec 0018 decision 4 / Out of scope).
-->
<ion-header class="settings-header">
  <ion-toolbar>
    <ion-title>Settings</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  @if (service.loaded()) {
  <div class="settings-content">
    <h2 class="settings-title">Settings</h2>

    <div class="settings-cards">
      <!-- Region row — `ion-select` carries the real behaviour. -->
      <div class="settings-card">
        <div class="settings-row">
          <div class="settings-row__icon" aria-hidden="true">
            <ion-icon name="globe-outline"></ion-icon>
          </div>
          <div class="settings-row__body">
            <ion-select
              class="settings-row__select"
              label="Region"
              labelPlacement="stacked"
              interface="popover"
              [value]="service.region()"
              (ionChange)="onRegionChange($event)"
            >
              @for (region of service.regions; track region) {
              <ion-select-option [value]="region"
                >{{ region }}</ion-select-option
              >
              }
            </ion-select>
            <p class="settings-row__helper">
              Content availability is based on this region.
            </p>
          </div>
        </div>
      </div>

      <!-- Notifications row — `ion-toggle` carries the real behaviour. -->
      <div class="settings-card">
        <div class="settings-row">
          <div class="settings-row__icon" aria-hidden="true">
            <ion-icon name="notifications-outline"></ion-icon>
          </div>
          <div class="settings-row__body">
            <ion-toggle
              class="settings-row__toggle"
              justify="space-between"
              [checked]="service.notificationsEnabled()"
              (ionChange)="onNotificationsChange($event)"
            >
              Notifications
            </ion-toggle>
            <p class="settings-row__helper">
              Alerts for new episodes and availability changes.
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
  } @else {
  <div class="settings-loading">
    <ion-spinner></ion-spinner>
  </div>
  }
</ion-content>
