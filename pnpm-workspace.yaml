packages:
  - 'apps/*'
  - 'libs/shared/*'
  - 'libs/mobile/*'
  - 'libs/functions/*'
  - 'tools/*'
allowBuilds:
  '@firebase/util': false
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  less: true
  lmdb: true
  msgpackr-extract: true
  nx: true
  protobufjs: false
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@capacitor/keyboard@8.0.5'
  - '@nx/angular@23.0.0'
  - '@nx/devkit@23.0.0'
  - '@nx/docker@23.0.0'
  - '@nx/esbuild@23.0.0'
  - '@nx/eslint-plugin@23.0.0'
  - '@nx/eslint@23.0.0'
  - '@nx/jest@23.0.0'
  - '@nx/js@23.0.0'
  - '@nx/module-federation@23.0.0'
  - '@nx/node@23.0.0'
  - '@nx/playwright@23.0.0'
  - '@nx/nx-darwin-arm64@23.0.0'
  - '@nx/nx-darwin-x64@23.0.0'
  - '@nx/nx-freebsd-x64@23.0.0'
  - '@nx/nx-linux-arm-gnueabihf@23.0.0'
  - '@nx/nx-linux-arm64-gnu@23.0.0'
  - '@nx/nx-linux-arm64-musl@23.0.0'
  - '@nx/nx-linux-x64-gnu@23.0.0'
  - '@nx/nx-linux-x64-musl@23.0.0'
  - '@nx/nx-win32-arm64-msvc@23.0.0'
  - '@nx/nx-win32-x64-msvc@23.0.0'
  - '@nx/rspack@23.0.0'
  - '@nx/vite@23.0.0'
  - '@nx/vitest@23.0.0'
  - '@nx/web@23.0.0'
  - '@nx/webpack@23.0.0'
  - '@nx/workspace@23.0.0'
  - nx@23.0.0
