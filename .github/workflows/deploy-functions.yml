name: Deploy Functions

# Manual deploy of the Cloud Functions to Firebase (project vultus-cab62).
# Mirrors the local `/deploy-functions` skill: preflight-validate the pruned
# artifact, then `firebase deploy --only functions`. Reproducible, runs in a
# Linux env close to Cloud Build, and removes the manual node_modules-in-dist
# and TRAKT_CLIENT_ID-prompt friction of a local deploy.
#
# PREREQUISITES (provision once in Settings → Secrets and variables → Actions):
#   - Secret  FIREBASE_SERVICE_ACCOUNT — JSON key for a service account with the
#     Firebase Admin + Cloud Functions Developer + Service Account User roles on
#     vultus-cab62. Used for non-interactive deploy auth.
#   - Variable TRAKT_CLIENT_ID — the (public) Trakt API client id. Written into
#     apps/functions/.env.vultus-cab62 so the firebase-functions defineString
#     param resolves without an interactive prompt. (The SYNC_SHARED_SECRET /
#     TMDB_READ_TOKEN secrets live in Secret Manager and need no wiring here.)
# workflow_dispatch only — never fires automatically.

on:
  workflow_dispatch:
    inputs:
      only:
        description: 'Deploy scope (e.g. functions or functions:syncTitles)'
        required: false
        default: 'functions'

concurrency:
  group: deploy-functions
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Write the non-secret TRAKT_CLIENT_ID param into the functions env file so
      # it ships into dist (build asset) and the defineString resolves without a
      # prompt. Fails fast if the variable is not configured.
      - name: Write functions env (TRAKT_CLIENT_ID)
        env:
          TRAKT_CLIENT_ID: ${{ vars.TRAKT_CLIENT_ID }}
        run: |
          if [ -z "$TRAKT_CLIENT_ID" ]; then
            echo "::error::TRAKT_CLIENT_ID variable is not set. Add it in Settings → Secrets and variables → Actions → Variables."
            exit 1
          fi
          printf 'TRAKT_CLIENT_ID=%s\n' "$TRAKT_CLIENT_ID" > apps/functions/.env.vultus-cab62

      # Build + prune + validate the deployable artifact (and leave a valid dist
      # node_modules for gen2 local discovery). Fails the deploy before upload on
      # any artifact problem.
      - name: Deploy preflight
        run: pnpm nx run functions:deploy-preflight

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy to Firebase
        run: pnpm exec firebase deploy --only ${{ inputs.only }} --project vultus-cab62 --non-interactive

      # After deploy, confirm the syncTitles Cloud Run service is publicly
      # invokable. gen2 onRequest functions are Cloud Run services, PRIVATE by
      # default; this function self-authenticates via the shared secret, so it
      # MUST allow unauthenticated invocations (allUsers → roles/run.invoker).
      # If the service is private, the Google Front End returns an HTML 403 and
      # the request never reaches the function — the cron would then fail daily.
      # This sends NO secret (it must not trigger a real sync); a reachable
      # function answers any unauthenticated POST with a JSON error body, which
      # proves invokability regardless of the auth outcome.
      # Placement: post-deploy because the check needs the deployed URL, which
      # only exists after deploy. functions:deploy-preflight runs pre-deploy and
      # validates the artifact only — folding this check into preflight is wrong.
      - name: Verify syncTitles is publicly invokable
        timeout-minutes: 2
        env:
          SYNC_URL: ${{ vars.VULTUS_SYNC_URL }}
        run: |
          if [ -z "$SYNC_URL" ]; then
            echo "::warning::VULTUS_SYNC_URL is not set; skipping the public-invokability smoke check. Set the repo Actions variable to enable it."
            exit 0
          fi
          # Unauthenticated POST (NO secret header). Capture body + status code
          # separately; do NOT use --fail so we always inspect the body.
          body_file="$(mktemp)"
          status="$(curl --silent --show-error \
            --retry 2 --retry-delay 5 \
            --max-time 60 \
            -o "$body_file" -w '%{http_code}' \
            -X POST "$SYNC_URL" \
            -H 'Content-Type: application/json' \
            -d '{}')"
          echo "Smoke check HTTP status: $status"
          if [ "$status" = "403" ] && grep -qiE 'Your client does not have permission|<title>403 Forbidden' "$body_file"; then
            echo "::error::syncTitles returned a Google Front End 403 — the Cloud Run service is PRIVATE (request never reached the function). Grant public invokability once: gcloud run services add-iam-policy-binding synctitles --region=europe-west1 --member=allUsers --role=roles/run.invoker --project=vultus-cab62  (see docs/PLAN.md §7)."
            exit 1
          fi
          echo "syncTitles is publicly invokable (function reached; got a function-level response)."
