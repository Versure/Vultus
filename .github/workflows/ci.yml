name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # No `name:` on this job: the check-run name must stay the job id `main` so the
  # required status check renders as `CI / main` (branch-protection ruleset). A
  # display name would override the check context and break the required check.
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so nx affected / nx-set-shas can reach the merge base.
          fetch-depth: 0

      - name: Set up pnpm
        # Lockfile is v9.0; pin pnpm major 9 to match the committed pnpm-lock.yaml.
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive Nx SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Cache Nx local cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-

      - name: Run affected gates (pull_request)
        if: github.event_name == 'pull_request'
        run: pnpm nx affected -t lint test build --base=$NX_BASE --head=$NX_HEAD --configuration=ci

      - name: Run all gates (push to main baseline)
        if: github.event_name == 'push'
        run: pnpm nx run-many -t lint test build --all --configuration=ci
