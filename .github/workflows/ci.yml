name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # No `name:` on this job: the check-run name must stay the job id `main` so the
  # required status check renders as `CI / main` (branch-protection ruleset). A
  # display name would override the check context and break the required check.
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so nx affected / nx-set-shas can reach the merge base.
          fetch-depth: 0

      - name: Set up pnpm
        # Lockfile is v9.0; pin pnpm major 9 to match the committed pnpm-lock.yaml.
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Set up Java
        # The Firestore emulator is a Java process; the integration gate below
        # runs it via `firebase emulators:exec`.
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Derive Nx SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Cache Nx local cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            nx-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nx-${{ runner.os }}-

      # Inject real config (TMDB key + Firebase web config) into the gitignored
      # generated env file before any build step (spec 0026). The mobile production
      # build (defaultConfiguration=production) file-replaces environment.ts with
      # environment.generated.ts; this single, unified script (shared by local +
      # CI) writes that file from the CI secrets/variables below and runs a loud
      # guard. It REPLACES the old spec-0015 step that sed-mutated the tracked
      # environment.prod.ts in place (a commit-leak risk). The committed env files
      # keep their placeholders. The script exits 1 with an actionable message on
      # any missing/empty value, keeping the fail-fast behaviour.
      # google-services.json is a native-build artifact and is NOT needed by this
      # web build, so it is not provisioned here.
      - name: Inject mobile env for production build
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
        run: node tools/scripts/inject-mobile-env.mjs

      - name: Run affected gates (pull_request)
        if: github.event_name == 'pull_request'
        run: pnpm nx affected -t typecheck lint test build --base=$NX_BASE --head=$NX_HEAD --configuration=ci

      - name: Run all gates (push to main baseline)
        if: github.event_name == 'push'
        run: pnpm nx run-many -t typecheck lint test build --all --configuration=ci

      # Emulator-backed integration gate (spec 0009). Runs on both pull_request
      # and push so it's a true required gate on PRs to main. Needs NO secrets:
      # the integration spec stubs the TMDB HTTP transport. `firebase
      # emulators:exec` boots only Firestore, sets FIRESTORE_EMULATOR_HOST for
      # the wrapped command (un-skipping the suite and pointing the Admin SDK at
      # the emulator credential-free), then tears the emulator down on exit. It
      # exits non-zero if the wrapped command fails, failing this gate.
      - name: Run emulator integration gate
        run: pnpm exec firebase emulators:exec --only firestore --project vultus-cab62 "pnpm nx test-integration functions"

      # e2e gate (spec 0019). Playwright drives the web-served app against the
      # Auth + Firestore emulators. NO secret: every TMDB call is intercepted with
      # committed fixtures (page.route), and the emulators need no credentials.
      # The Functions emulator is NOT started — flow 8's sync is stubbed at the
      # network layer (R2). Java is already set up above for the integration gate.
      #
      # `emulators:exec` boots ONLY firestore,auth on the default ports 8080/9099
      # (the browser app hardcodes those — Emulator-port invariant) and exports
      # FIRESTORE_EMULATOR_HOST / FIREBASE_AUTH_EMULATOR_HOST for the Node-side
      # globalSetup/support, then tears them down on exit. Plain `nx ... -t e2e`
      # (NOT --configuration=ci, which the e2e target does not define).
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run e2e gate (pull_request)
        if: github.event_name == 'pull_request'
        run: pnpm exec firebase emulators:exec --only firestore,auth --project vultus-cab62 "pnpm nx affected -t e2e --base=$NX_BASE --head=$NX_HEAD"

      - name: Run e2e gate (push to main baseline)
        if: github.event_name == 'push'
        run: pnpm exec firebase emulators:exec --only firestore,auth --project vultus-cab62 "pnpm nx run-many -t e2e --all"

      # Validate the deployable Cloud Functions artifact the way Firebase / Cloud
      # Build will: the pruned dist bundle installs, the required deps + allowBuilds
      # config ship, firebase-admin satisfies firebase-functions' peer range, and
      # main.js loads (gen2 discovery). The lint/test/build gates validate the
      # monorepo but never this pruned artifact, so every past deploy-blocker
      # (peer ERESOLVE, missing functions-framework, ERR_PNPM_IGNORED_BUILDS,
      # broken discovery) was invisible to them. Nx build cache keeps this cheap.
      - name: Cloud Functions deploy preflight
        run: pnpm nx run functions:deploy-preflight
